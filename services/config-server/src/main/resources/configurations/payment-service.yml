spring:
  datasource:
    url: ${PAYMENT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.mclavo.ecommerce.*"
        spring.json.type.mapping: paymentConfirmed:com.mclavo.ecommerce.payment.infrastucture.messaging.event.PaymentConfirmedEvent,paymentFailed:com.mclavo.ecommerce.payment.infrastucture.messaging.event.PaymentFailedEvent

    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.mclavo.ecommerce.*"

server:
  port: 8060
