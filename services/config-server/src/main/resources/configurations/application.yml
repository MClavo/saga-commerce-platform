eureka:
  instance:
    hostname: localhost

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
spring:
  cloud:
    config:
      override-system-properties: false  

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9098/realms/ecommerce

management:
  tracing:
    sampling:
      probability: 1.0

application:
  kafka:
    order-created-topic: order.created
    product-reservation-succeeded-topic: product.reservation.succeeded
    product-reservation-failed-topic: product.reservation.failed
    payment-confirmed-topic: payment.confirmed
    payment-failed-topic: payment.failed
    order-confirmed-topic: order.confirmed
    order-cancelled-topic: order.cancelled
    notification-requested-topic: notification.requested
