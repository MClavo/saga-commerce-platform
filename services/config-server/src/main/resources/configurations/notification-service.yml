spring:
  mongodb:
    username: ${MONGODB_USERNAME:mongodb}
    password: ${MONGODB_PASSWORD:mongodb}
    host: ${MONGODB_HOST:localhost}
    port: ${MONGODB_PORT:27017}
    database: ${MONGODB_DATABASE:notification}
    authentication-database: ${MONGODB_AUTHENTICATION_DATABASE:admin}

  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.mclavo.ecommerce.*"
        spring.json.type.mapping: notificationRequested:com.mclavo.ecommerce.notification.NotificationRequestedEvent
        
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:maildev}
    password: ${MAIL_PASSWORD:maildev}
    properties:
      mail:
        smtp:
          trust: "*"
        auth: true
        starttls:
          enable: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000


server:
  port: 8040

application:
  kafka:
    notification-requested-topic: notification.requested
