spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ecommerce-gateway
            client-secret: ${KEYCLOAK_GATEWAY_SECRET:dev-gateway-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_AUTHORIZATION_URI:http://localhost:9098/realms/ecommerce/protocol/openid-connect/auth}
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:9098/realms/ecommerce/protocol/openid-connect/token}
            jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:9098/realms/ecommerce/protocol/openid-connect/certs}
            user-info-uri: ${KEYCLOAK_USER_INFO_URI:http://localhost:9098/realms/ecommerce/protocol/openid-connect/userinfo}
            user-name-attribute: preferred_username
            
  cloud:
    gateway:
      server:
        webflux:  
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - ${FRONTEND_URL:http://localhost:5173}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - Authorization
                  - Content-Type
                  - Accept
                allow-credentials: true
          discovery:
            locator:
              enabled: true
          routes:
            - id: customer-service
              uri: ${CUSTOMER_SERVICE_URI:lb://CUSTOMER-SERVICE}
              predicates:
                - Path=/api/v1/customers/**
              filters:
                - TokenRelay=

            - id: order-service
              uri: ${ORDER_SERVICE_URI:lb://ORDER-SERVICE}
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - TokenRelay=

            - id: product-service-public-read
              uri: ${PRODUCT_SERVICE_URI:lb://PRODUCT-SERVICE}
              predicates:
                - Path=/api/v1/products/**
                - Method=GET

            - id: product-service-protected-write
              uri: ${PRODUCT_SERVICE_URI:lb://PRODUCT-SERVICE}
              predicates:
                - Path=/api/v1/products/**
                - Method=POST,PUT,PATCH,DELETE
              filters:
                - TokenRelay=

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URI:lb://PAYMENT-SERVICE}
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - TokenRelay=

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

server:
  port: 8222
  reactive:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: false
