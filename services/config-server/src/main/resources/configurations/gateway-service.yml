spring:
  cloud:
    gateway:
      server:
        webflux:  
          discovery:
            locator:
              enabled: true
          routes:
            - id: customer-service
              uri: ${CUSTOMER_SERVICE_URI:lb:http://CUSTOMER-SERVICE}
              predicates:
                - Path=/api/v1/customers/**

            - id: order-service
              uri: ${ORDER_SERVICE_URI:lb:http://ORDER-SERVICE}
              predicates:
                - Path=/api/v1/orders/**

            - id: product-service
              uri: ${PRODUCT_SERVICE_URI:lb:http://PRODUCT-SERVICE}
              predicates:
                - Path=/api/v1/products/**

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URI:lb:http://PAYMENT-SERVICE}
              predicates:
                - Path=/api/v1/payments/**

server:
  port: 8222
