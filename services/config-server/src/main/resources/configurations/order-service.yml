spring:
  datasource:
    url: ${ORDER_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orders}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.mclavo.ecommerce.*"
        spring.json.type.mapping: productReservationRequested:com.mclavo.ecommerce.order.infrastructure.messaging.event.ProductReservationRequestedEvent,paymentRequested:com.mclavo.ecommerce.order.infrastructure.messaging.event.PaymentRequestedEvent,orderConfirmed:com.mclavo.ecommerce.order.infrastructure.messaging.event.OrderConfirmedEvent,orderCancelled:com.mclavo.ecommerce.order.infrastructure.messaging.event.OrderCancelledEvent,notificationRequested:com.mclavo.ecommerce.order.infrastructure.messaging.event.NotificationRequestedEvent

    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.mclavo.ecommerce.*"
        spring.json.type.mapping: productReservationSucceeded:com.mclavo.ecommerce.order.infrastructure.messaging.event.ProductReservationSucceededEvent,productReservationFailed:com.mclavo.ecommerce.order.infrastructure.messaging.event.ProductReservationFailedEvent,paymentConfirmed:com.mclavo.ecommerce.order.infrastructure.messaging.event.PaymentConfirmedEvent,paymentFailed:com.mclavo.ecommerce.order.infrastructure.messaging.event.PaymentFailedEvent

server:
  port: 8070

application:
  client:
    customer-url: ${CUSTOMER_SERVICE_URL:http://localhost:8222/api/v1/customers}
  
