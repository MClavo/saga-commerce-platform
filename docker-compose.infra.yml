x-kafka-image: &kafka-image apache/kafka:4.2.0

services:
  postgres:
    container_name: ms_postgres
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /data/postgres
    volumes:
      - postgres:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - 5432:5432
    networks:
      - ecommerce-network
    restart: unless-stopped

  pgadmin:
    container_name: ms_pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - 5050:80
    networks:
      - ecommerce-network
    restart: unless-stopped

  mongodb:
    image: mongo
    container_name: ms_mongodb
    ports:
      - 27017:27017
    volumes:
      - mongo:/data
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongodb
      - MONGO_INITDB_ROOT_PASSWORD=mongodb
    networks:
    - ecommerce-network

  mongo-express:
    image: mongo-express
    container_name: ms_mongo_express
    restart: always
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=mongodb
      - ME_CONFIG_MONGODB_ADMINPASSWORD=mongodb
      - ME_CONFIG_MONGODB_SERVER=mongodb
    networks:
    - ecommerce-network

  kafka:
    image: *kafka-image
    container_name: ms_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - ecommerce-network
  
  kafka-init:
    image: *kafka-image
    container_name: ms_kafka_init
    depends_on:
      kafka:
        condition: service_started
    networks:
      - ecommerce-network
    volumes:
      - ./docker/kafka/create-topics.sh:/create-topics.sh
      - ./docker/kafka/topics.env:/topics.env
    entrypoint: ["/bin/sh", "/create-topics.sh"]

  mail-dev:
    container_name: ms_mail_dev
    image: maildev/maildev:latest
    ports:
      - 1080:1080
      - 1025:1025
    networks:
      - ecommerce-network
    restart: always

  zipkin:
    image: openzipkin/zipkin
    container_name: ms_zipkin
    ports:
      - 9411:9411
    networks:
      - ecommerce-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    container_name: ms_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:9098
      KC_HOSTNAME_STRICT: "false"
    ports:
      - 9098:8080
    networks:
      - ecommerce-network
    command: ["start-dev"]

networks:
  ecommerce-network:
    driver: bridge
    external: true

volumes:
  postgres:
  pgadmin:
  mongo:
