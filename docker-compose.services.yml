# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - ecommerce-network

x-config-client-env: &config-client-env
  CONFIG_SERVER_URL: http://config-server:8888
  EUREKA_SERVER_URL: http://discovery:8761/eureka/
  JWT_ISSUER_URI: http://localhost:9098/realms/ecommerce
  JWT_JWK_SET_URI: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs
  KEYCLOAK_GATEWAY_SECRET: dev-gateway-secret
  KEYCLOAK_AUTHORIZATION_URI: http://localhost:9098/realms/ecommerce/protocol/openid-connect/auth
  KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/token
  KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/certs
  KEYCLOAK_USER_INFO_URI: http://keycloak:8080/realms/ecommerce/protocol/openid-connect/userinfo

x-postgres-env: &postgres-env
  POSTGRES_USERNAME: postgres
  POSTGRES_PASSWORD: postgres

x-mongo-env: &mongo-env
  MONGODB_HOST: mongodb
  MONGODB_PORT: 27017
  MONGODB_USERNAME: mongodb
  MONGODB_PASSWORD: mongodb
  MONGODB_AUTHENTICATION_DATABASE: admin

x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092

x-mail-env: &mail-env
  MAIL_HOST: mail-dev
  MAIL_PORT: 1025
  MAIL_USERNAME: maildev
  MAIL_PASSWORD: maildev

services:
  config-server:
    <<: *service-defaults
    image: ecommerce/config-server:local-ecommerce
    container_name: ecommerce-config-server
    ports:
      - "8888:8888"

  discovery:
    <<: *service-defaults
    image: ecommerce/discovery:local-ecommerce
    container_name: ecommerce-discovery
    environment:
      <<: *config-client-env
      EUREKA_INSTANCE_HOSTNAME: discovery
    ports:
      - "8761:8761"
    depends_on:
      - config-server

  customer:
    <<: *service-defaults
    image: ecommerce/customer:local-ecommerce
    container_name: ecommerce-customer
    environment:
      <<: [*config-client-env, *mongo-env]
      MONGODB_DATABASE: customer
    depends_on:
      - config-server
      - discovery

  product:
    <<: *service-defaults
    image: ecommerce/product:local-ecommerce
    container_name: ecommerce-product
    environment:
      <<: [*config-client-env, *postgres-env, *kafka-env]
      PRODUCT_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product
    depends_on:
      - config-server
      - discovery

  payment:
    <<: *service-defaults
    image: ecommerce/payment:local-ecommerce
    container_name: ecommerce-payment
    environment:
      <<: [*config-client-env, *postgres-env, *kafka-env]
      PAYMENT_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment
    depends_on:
      - config-server
      - discovery

  notification:
    <<: *service-defaults
    image: ecommerce/notification:local-ecommerce
    container_name: ecommerce-notification
    environment:
      <<: [*config-client-env, *mongo-env, *kafka-env, *mail-env]
      MONGODB_DATABASE: notification
    depends_on:
      - config-server
      - discovery

  order:
    <<: *service-defaults
    image: ecommerce/order:local-ecommerce
    container_name: ecommerce-order
    environment:
      <<: [*config-client-env, *postgres-env, *kafka-env]
      ORDER_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orders
      CUSTOMER_SERVICE_URL: http://gateway:8222/api/v1/customers
    depends_on:
      - config-server
      - discovery
      - customer
      - product
      - payment

  gateway:
    <<: *service-defaults
    image: ecommerce/gateway:local-ecommerce
    container_name: ecommerce-gateway
    environment:
      <<: *config-client-env
    ports:
      - "8222:8222"
    depends_on:
      - config-server
      - discovery
      - customer
      - product
      - payment
      - order
      - notification

networks:
  ecommerce-network:
    external: true
