server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ────────────────────────── Gateway Proxy Headers ──────────────────────────
    proxy_set_header Host localhost:5173;
    proxy_set_header X-Forwarded-Host localhost:5173;
    proxy_set_header X-Forwarded-Proto http;
    proxy_set_header X-Forwarded-Port 5173;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # ────────────────────────── Backend / Gateway Routes ──────────────────────────
    location /api/ {
        proxy_pass http://gateway:8222/api/;
    }

    location /auth/ {
        proxy_pass http://gateway:8222/auth/;
    }

    location /oauth2/ {
        proxy_pass http://gateway:8222/oauth2/;
    }

    location /login/ {
        proxy_pass http://gateway:8222/login/;
    }

    location /logout {
        proxy_pass http://gateway:8222/logout;
    }

    # ────────────────────────── React SPA Routes ──────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}